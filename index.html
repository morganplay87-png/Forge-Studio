<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Forge IDE V7 (Stable)</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
    overflow:hidden;
}

#app {
    display:flex;
    height:100vh;
}

.panel {
    background:#0f172a;
    border:1px solid #1f2a44;
    overflow:auto;
}

#left { width:220px; padding:10px; }
#center { flex:1; display:flex; flex-direction:column; }
#right { width:260px; padding:10px; }

#editorWrap {
    position:relative;
    flex:1;
}

/* SAFE HIGHLIGHT LAYER */
#highlight {
    position:absolute;
    width:100%;
    height:100%;
    padding:10px;
    font-family:monospace;
    background:#0a0f1d;
    white-space:pre-wrap;
    overflow:auto;
    z-index:1;
}

textarea {
    position:absolute;
    width:100%;
    height:100%;
    padding:10px;
    font-family:monospace;
    background:transparent;
    color:transparent;
    caret-color:white;
    border:none;
    outline:none;
    z-index:2;
}

button {
    background:#2563eb;
    color:white;
    border:none;
    padding:6px;
    margin:2px;
    cursor:pointer;
}

button:hover {
    background:#1d4ed8;
}

.file {
    padding:6px;
    margin:3px;
    background:#1b2a4a;
    cursor:pointer;
}

#output {
    height:120px;
    background:#0a0f1d;
    padding:8px;
    font-family:monospace;
    overflow:auto;
}

#suggestions div {
    background:#1e293b;
    margin:2px;
    padding:4px;
    cursor:pointer;
}

/* FORGE AI STYLES */
#forgeAiButton {
    background:#7c3aed;
    padding:8px 12px;
    margin:5px 0;
    font-weight:bold;
    transition:all 0.3s;
}

#forgeAiButton:hover {
    background:#6d28d9;
}

#forgeAiButton.active {
    background:#a78bfa;
}

#forgeAiPanel {
    display:none;
    position:absolute;
    right:0;
    top:0;
    width:300px;
    height:100%;
    background:#0f172a;
    border-left:2px solid #7c3aed;
    z-index:10;
    flex-direction:column;
}

#forgeAiPanel.open {
    display:flex;
}

#forgeAiPanel h3 {
    margin:10px 10px 5px 10px;
    color:#a78bfa;
    border-bottom:1px solid #7c3aed;
    padding-bottom:5px;
}

#forgeAiPanel .ai-section {
    flex:1;
    display:flex;
    flex-direction:column;
    padding:10px;
    border-bottom:1px solid #1f2a44;
}

#forgeAiPrompt {
    flex:1;
    background:#0a0f1d;
    color:#fff;
    border:1px solid #1f2a44;
    padding:8px;
    font-family:monospace;
    font-size:12px;
    resize:none;
    margin-bottom:8px;
}

#forgeAiResponse {
    flex:1;
    background:#0a0f1d;
    color:#22c55e;
    border:1px solid #1f2a44;
    padding:8px;
    font-family:monospace;
    font-size:11px;
    overflow:auto;
    margin-bottom:8px;
}

.ai-actions {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:5px;
    margin:5px 0;
}

.ai-action-btn {
    padding:8px 6px;
    font-size:12px;
    background:#1e293b;
    color:#7c3aed;
    border:1px solid #7c3aed;
    cursor:pointer;
    transition:all 0.2s;
}

.ai-action-btn:hover {
    background:#7c3aed;
    color:white;
}

#forgeAiClose {
    position:absolute;
    top:10px;
    right:10px;
    background:#7c3aed;
    border:none;
    color:white;
    width:24px;
    height:24px;
    padding:0;
    cursor:pointer;
    font-size:16px;
    line-height:1;
}

.loading {
    opacity:0.6;
    cursor:not-allowed;
}

.loading::after {
    content:" ...";
    animation:dots 1.5s infinite;
}

@keyframes dots {
    0%, 20% { content:" "; }
    40% { content:"."; }
    60% { content:".."; }
    80%, 100% { content:"..."; }
}

#editorWrap {
    position:relative;
    flex:1;
}

#editorWrap.ai-open {
    margin-right:300px;
}
</style>
</head>

<body>

<div id="app">

<!-- FILES -->
<div id="left" class="panel">
<h3>Files</h3>
<button onclick="newFile()">New</button>
<button onclick="saveProject()">Save</button>
<button onclick="loadProject()">Load</button>
<button id="forgeAiButton" onclick="toggleForgeAiPanel()">🤖 Forge AI</button>
<div id="files"></div>
</div>

<!-- CENTER -->
<div id="center" class="panel">

<div style="padding:6px;background:#111a2e;">
<button onclick="run()">Run</button>
<button onclick="step()">Step</button>
</div>

<div id="editorWrap">
    <div id="highlight"></div>
    <textarea id="code"></textarea>
    
    <!-- FORGE AI PANEL -->
    <div id="forgeAiPanel">
        <button id="forgeAiClose" onclick="toggleForgeAiPanel()">✕</button>
        
        <h3>Forge AI</h3>
        
        <div class="ai-section">
            <label style="font-size:12px; margin-bottom:5px;">Your Prompt:</label>
            <textarea id="forgeAiPrompt" placeholder="Ask AI to modify, explain, or generate code..."></textarea>
            <button onclick="forgeAI.sendPrompt()" style="background:#7c3aed; width:100%;">Send to AI</button>
        </div>
        
        <div class="ai-section">
            <label style="font-size:12px; margin-bottom:5px;">AI Response:</label>
            <div id="forgeAiResponse">Ready for AI responses...</div>
        </div>
        
        <div style="padding:10px; border-top:1px solid #1f2a44;">
            <label style="font-size:12px; display:block; margin-bottom:8px;">Quick Actions:</label>
            <div class="ai-actions">
                <button class="ai-action-btn" onclick="forgeAI.fixCode()">Fix Code</button>
                <button class="ai-action-btn" onclick="forgeAI.explainCode()">Explain</button>
                <button class="ai-action-btn" onclick="forgeAI.optimizeCode()">Optimize</button>
                <button class="ai-action-btn" onclick="forgeAI.insertGenerated()">Insert Gen</button>
            </div>
        </div>
    </div>
</div>

<div id="output">Output...</div>
<div id="suggestions"></div>
</div>

<!-- RIGHT -->
<div id="right" class="panel">
<h3>Debug</h3>
<button onclick="mode='assist'">Assist</button>
<button onclick="mode='plan'">Plan</button>
<button onclick="ai()">Run</button>

<pre id="ai"></pre>
<pre id="debug"></pre>
</div>

</div>

<script src="ai-plugin.js"></script>
<script>

/* ================= SAFE STATE ================= */
let files = {"main.fg":"print \"Hello Forge\""};
let current = "main.fg";

let vars = {};
let mode = "assist";
let astCache = [];
let stepIndex = 0;

/* ================= KEYWORDS ================= */
const keywords = ["print","set","add","loop","if","fn"];

/* ================= FILE SYSTEM ================= */
function renderFiles(){
    let f = document.getElementById("files");
    f.innerHTML = "";

    Object.keys(files).forEach(n=>{
        let d = document.createElement("div");
        d.className = "file";
        d.innerText = n;
        d.onclick = () => loadFile(n);
        f.appendChild(d);
    });
}
renderFiles();

function loadFile(n){
    current = n;
    document.getElementById("code").value = files[n];
    updateHighlight();
}

function newFile(){
    let n = prompt("filename");
    if(!n) return;
    files[n] = "print \"new file\"";
    renderFiles();
}

/* ================= SAVE / LOAD ================= */
function saveProject(){
    localStorage.setItem("forge", JSON.stringify(files));
}

function loadProject(){
    let d = localStorage.getItem("forge");
    if(d){
        files = JSON.parse(d);
        renderFiles();
    }
}

/* ================= TOKENIZER (SOURCE OF TRUTH) ================= */
function tokenize(code){
    return code
        .replace(/\{/g," { ")
        .replace(/\}/g," } ")
        .replace(/"/g,' " ')
        .split(/\s+/)
        .filter(Boolean);
}

/* ================= SAFE HIGHLIGHT ================= */
function updateHighlight(){
    let t = tokenize(document.getElementById("code").value);

    document.getElementById("highlight").innerHTML =
    t.map(x=>{

        if(x==="{"||x==="}") return `<span style="color:#60a5fa">${x}</span>`;
        if(x==='"') return `<span style="color:#22c55e">"</span>`;
        if(/^\d+$/.test(x)) return `<span style="color:#f59e0b">${x}</span>`;
        if(keywords.includes(x)) return `<span style="color:#a855f7">${x}</span>`;
        if(/^[a-zA-Z_]/.test(x)) return `<span style="color:#ef4444">${x}</span>`;

        return x;

    }).join(" ");
}

/* ================= PARSER ================= */
function parse(t){
    let i = 0;

    function walk(){
        let out = [];

        while(i < t.length){
            let x = t[i];

            if(x === "print"){
                out.push({type:"print", value:t[++i]});
                i++;
            }

            else if(x === "set"){
                let n = t[++i]; i++;
                let v = Number(t[++i]);
                out.push({type:"set", name:n, value:v});
                i++;
            }

            else if(x === "add"){
                let n = t[++i];
                let v = Number(t[++i]);
                out.push({type:"add", name:n, value:v});
                i++;
            }

            else if(x === "loop"){
                let c = Number(t[++i]);
                i++;
                let body = walk();
                out.push({type:"loop", count:c, body});
            }

            else if(x === "}"){
                i++;
                return out;
            }

            else {
                i++;
            }
        }

        return out;
    }

    return walk();
}

/* ================= VM ================= */
function runAST(ast, out){

    for(let n of ast){

        if(n.type === "print"){
            out.push(String(n.value).replace(/"/g,""));
        }

        if(n.type === "set"){
            vars[n.name] = n.value;
        }

        if(n.type === "add"){
            vars[n.name] = (vars[n.name] || 0) + n.value;
        }

        if(n.type === "loop"){
            for(let i=0;i<n.count;i++){
                runAST(n.body, out);
            }
        }
    }
}

/* ================= RUN ================= */
function run(){
    vars = {};
    stepIndex = 0;

    let tokens = tokenize(document.getElementById("code").value);
    astCache = parse(tokens);

    let out = [];
    runAST(astCache, out);

    document.getElementById("output").innerText = out.join("\n");
    document.getElementById("debug").innerText =
        JSON.stringify(vars, null, 2);
}

/* ================= STEP (SAFE PLACEHOLDER) ================= */
function step(){
    document.getElementById("debug").innerText =
        "Step system stable placeholder (next upgrade: real VM stepping)";
}

/* ================= AUTOCOMPLETE ================= */
document.getElementById("code").addEventListener("input", e=>{
    updateHighlight();

    let last = e.target.value.split(/\s+/).pop();
    let s = keywords.filter(k => k.startsWith(last));

    document.getElementById("suggestions").innerHTML =
        s.map(x=>`<div>${x}</div>`).join("");
});

/* ================= FORGE AI PANEL TOGGLE ================= */
function toggleForgeAiPanel(){
    let panel = document.getElementById("forgeAiPanel");
    let btn = document.getElementById("forgeAiButton");
    let wrap = document.getElementById("editorWrap");
    
    panel.classList.toggle("open");
    btn.classList.toggle("active");
    wrap.classList.toggle("ai-open");
}

/* ================= AI (LEGACY) ================= */
function ai(){
    let t = parse(tokenize(document.getElementById("code").value));

    if(mode === "assist"){
        document.getElementById("ai").innerText =
            "ASSIST:\nAST nodes: " + t.length;
    } else {
        document.getElementById("ai").innerText =
            "PLAN:\nSystem flow: tokenizer → parser → VM → output";
    }
}

/* INIT */
updateHighlight();
renderFiles();

</script>

</body>
</html>
